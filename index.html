<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbfbfa">
  <title>Operación Navidad</title>
  <style>
    :root{
      --bg:#fbfbfa;
      --ink:#050505;
      --soft:#d9d9d9;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}
    body{
      min-height:100svh;
      display:flex;
      justify-content:center;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:radial-gradient(circle at 50% 18%,rgba(0,0,0,.035),transparent 34%),linear-gradient(180deg,#fff 0%,#fafafa 100%);
      overscroll-behavior:none;
    }
    button{font:inherit;color:inherit;border:0;background:transparent;cursor:pointer}
    .app{
      width:min(100vw,520px);
      min-height:100svh;
      padding:calc(14px + var(--safe-top)) clamp(18px,5vw,28px) calc(14px + var(--safe-bottom));
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .screen{
      min-height:calc(100svh - var(--safe-top) - var(--safe-bottom) - 28px);
      display:flex;
      flex-direction:column;
      animation:screenIn .34s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes screenIn{
      from{opacity:0;transform:translateY(10px);filter:blur(2px)}
      to{opacity:1;transform:translateY(0);filter:blur(0)}
    }
    .head{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:12px;
      align-items:end;
      font-size:clamp(10px,2.55vw,14px);
      font-weight:950;
      letter-spacing:.28em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .head .right{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
      letter-spacing:.1em;
    }
    .head.title-head .right{letter-spacing:.28em}
    .top-rule{height:4px;background:#000;width:100%;margin:9px 0 clamp(20px,5svh,38px)}
    .section-title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      margin:0 0 14px;
      font-size:clamp(12px,3vw,15px);
      letter-spacing:.48em;
      font-weight:950;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .section-title:before,.section-title:after{content:"";height:3px;background:#000;width:min(21vw,120px);flex:0 1 auto}
    .script{
      font-family:Georgia,"Times New Roman",serif;
      font-style:italic;
      font-weight:400;
      letter-spacing:-.045em;
      text-align:center;
      line-height:.98;
    }
    .spacer{flex:1;min-height:38px}
    .big-word,.hero-number,.hero-word,.level-number{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      text-align:center;
      letter-spacing:-.052em;
      margin:0;
    }
    .big-word{font-size:clamp(82px,24vw,132px);line-height:.78}
    .hero-number{font-size:clamp(84px,24vw,132px);line-height:.78}
    .hero-word{
      font-size:clamp(44px,13vw,68px);
      line-height:.85;
      text-transform:uppercase;
      letter-spacing:-.025em;
      margin-top:9px;
    }
    .hero-label{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(27px,7.2vw,42px);
      text-align:center;
      text-transform:uppercase;
      line-height:.9;
      margin:8px 0 0;
      letter-spacing:-.02em;
    }
    .metric-line{height:2px;background:#000;width:70%;margin:clamp(18px,3.8svh,26px) auto}
    .last-day{
      width:100%;
      margin:0 auto clamp(20px,4.2svh,34px);
      border-top:2px solid #000;
      border-bottom:2px solid #000;
      padding:10px 0 11px;
      text-align:center;
      animation:lastIn .42s cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes lastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .last-day .eyebrow{
      font-size:clamp(10px,2.7vw,12px);
      font-weight:950;
      letter-spacing:.38em;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    .last-day .summary{
      font-size:clamp(13px,3.45vw,17px);
      font-weight:950;
      letter-spacing:.12em;
      text-transform:uppercase;
      line-height:1.25;
    }
    .bottom-area{margin-top:auto;padding-top:18px;border-top:1px solid var(--soft)}
    .pill{
      width:100%;
      min-height:64px;
      border:3.5px solid #000;
      border-radius:999px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:12px 18px;
      background:#fff;
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(27px,7.5vw,42px);
      line-height:.95;
      text-transform:uppercase;
      letter-spacing:.01em;
      transition:transform .16s ease,background .16s ease,color .16s ease;
    }
    .pill:active{transform:scale(.976)}
    .note{margin:12px 0 0;color:#111;font-size:clamp(18px,5vw,26px)}
    .footer-actions{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:14px;
      font-size:12px;
      letter-spacing:.22em;
      font-weight:950;
      text-transform:uppercase;
    }
    .footer-actions button{border-bottom:2px solid #000;padding-bottom:4px}
    .planning-meta{
      margin:-6px auto 20px;
      width:100%;
      text-align:center;
      font-size:clamp(13px,3.5vw,18px);
      font-weight:950;
      letter-spacing:.32em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .dropdown{position:relative;margin:4px 0 14px;z-index:5}
    .select-face{
      width:100%;
      min-height:82px;
      border:3.5px solid #000;
      border-radius:34px;
      background:#fff;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:12px;
      text-align:left;
      padding:15px 18px 14px 20px;
      transition:transform .16s ease;
    }
    .select-face:active{transform:scale(.985)}
    .select-face.static{grid-template-columns:1fr}
    .selected-label{
      display:block;
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(25px,7vw,40px);
      line-height:.93;
      text-transform:uppercase;
      letter-spacing:-.01em;
    }
    .chevron{
      width:30px;
      height:30px;
      position:relative;
      flex:0 0 30px;
      font-size:0;
      line-height:0;
      transform:none;
      transition:transform .22s ease;
    }
    .chevron:before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:12px;
      height:12px;
      border-right:4px solid #000;
      border-bottom:4px solid #000;
      transform:translate(-50%,-68%) rotate(45deg);
    }
    .dropdown.open .chevron{transform:rotate(180deg)}
    .options{
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 10px);
      background:var(--bg);
      border:3px solid #000;
      border-radius:28px;
      padding:8px;
      display:none;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
      max-height:min(52svh,420px);
      overflow:auto;
    }
    .dropdown.open .options{display:block}
    .option{
      width:100%;
      text-align:left;
      border-radius:20px;
      padding:13px 14px;
      font-weight:950;
      font-size:clamp(14px,3.8vw,18px);
      line-height:1.05;
      text-transform:uppercase;
      letter-spacing:.03em;
      border-bottom:1.5px solid #000;
    }
    .option:last-child{border-bottom:0}
    .option.selected{background:#000;color:#fff}
    .option.disabled{opacity:.28;pointer-events:none}
    .forecast-card{
      border-top:2px solid #000;
      border-bottom:2px solid #000;
      padding:13px 0;
      margin:16px auto 0;
      width:86%;
      text-align:center;
    }
    .forecast-card .big{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(30px,8vw,44px);
      line-height:.9;
      text-transform:uppercase;
    }
    .forecast-card .title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin:0 0 10px;
      font-size:clamp(10px,2.75vw,13px);
      font-weight:950;
      letter-spacing:.38em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .forecast-card .title:before,.forecast-card .title:after{
      content:"";
      height:2px;
      background:#000;
      width:min(18vw,95px);
      flex:0 1 auto;
    }
    .forecast-card .small{
      margin-top:7px;
      font-size:clamp(11px,3vw,14px);
      font-weight:950;
      letter-spacing:.22em;
      text-transform:uppercase;
    }
    .stat-row{
      width:100%;
      margin:clamp(18px,4svh,30px) auto 0;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      align-items:stretch;
      border-top:2px solid #000;
      border-bottom:2px solid #000;
    }
    .stat-cell{
      min-width:0;
      padding:clamp(10px,2.4svh,16px) 7px;
      text-align:center;
      border-right:1.5px solid #000;
    }
    .stat-cell:last-child{border-right:0}
    .stat-number{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(27px,8vw,42px);
      line-height:.86;
      letter-spacing:-.04em;
      white-space:nowrap;
    }
    .stat-label{
      margin-top:7px;
      font-size:clamp(8px,2.35vw,11px);
      font-weight:950;
      letter-spacing:.2em;
      text-transform:uppercase;
      line-height:1.18;
    }
    .level-screen{
      position:relative;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:0;
      overflow:hidden;
    }
    .level-title{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      text-align:center;
      font-size:clamp(57px,17vw,92px);
      line-height:.82;
      letter-spacing:-.04em;
      margin:0;
      text-transform:uppercase;
      animation:pop .72s cubic-bezier(.16,1,.3,1) both;
    }
    .level-frame{
      margin:0 auto 12px;
      text-align:center;
      border-top:4px solid #000;
      border-bottom:4px solid #000;
      padding:16px 0 12px;
      width:82%;
      animation:frame .9s cubic-bezier(.16,1,.3,1) both;
    }
    .level-eyebrow{
      display:block;
      font-weight:950;
      letter-spacing:.44em;
      font-size:clamp(12px,3vw,15px);
      text-transform:uppercase;
      margin-bottom:4px;
    }
    .level-number{
      display:block;
      font-size:clamp(104px,31vw,162px);
      line-height:.76;
      animation:pulse 1.2s cubic-bezier(.16,1,.3,1) both;
    }
    .ability-card{
      margin:16px auto 0;
      width:88%;
      text-align:center;
      padding:15px 12px;
      border:3px solid #000;
      border-radius:26px;
      background:#fff;
      animation:card .64s .28s cubic-bezier(.16,1,.3,1) both;
    }
    .ability-card .eyebrow{
      font-size:11px;
      font-weight:950;
      letter-spacing:.42em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .ability-card .name{
      font-family:Impact,Haettenschweiler,"Arial Black",sans-serif;
      font-size:clamp(25px,7.4vw,40px);
      line-height:.9;
      text-transform:uppercase;
    }
    .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
    .confetti i{
      position:absolute;
      top:-20px;
      left:var(--x);
      width:var(--w);
      height:var(--h);
      background:#000;
      opacity:var(--o);
      border-radius:2px;
      animation:fall var(--d) cubic-bezier(.2,.8,.2,1) var(--delay) both;
    }
    .confetti i:nth-child(3n){background:#fff;border:2px solid #000}
    .confetti i:nth-child(4n){width:3px;height:18px;border-radius:999px}
    @keyframes fall{
      0%{transform:translate3d(0,-30px,0) rotate(0deg);opacity:0}
      10%{opacity:var(--o)}
      100%{transform:translate3d(var(--dx),105svh,0) rotate(720deg);opacity:0}
    }
    @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.94);filter:blur(2px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
    @keyframes pulse{0%{transform:scale(.72);opacity:0;filter:blur(5px)}55%{transform:scale(1.09);opacity:1;filter:blur(0)}100%{transform:scale(1)}}
    @keyframes frame{from{clip-path:inset(0 50% 0 50%);opacity:.2}to{clip-path:inset(0 0 0 0);opacity:1}}
    @keyframes card{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .final-text{
      margin:22px auto 0;
      width:86%;
      text-align:center;
      font-weight:760;
      line-height:1.38;
      font-size:clamp(15px,4vw,18px);
    }
    @media(max-height:750px){
      .app{padding-top:14px}
      .top-rule{margin-bottom:20px}
      .hero-number{font-size:clamp(70px,21vw,112px)}
      .metric-line{margin:16px auto}
      .pill{min-height:56px}
      .select-face{min-height:72px}
      .last-day{margin-bottom:18px;padding:9px 0}
    }
    @media(max-height:680px){
      .section-title{margin-bottom:9px}
      .hero-number{font-size:66px}
      .hero-label{font-size:25px}
      .metric-line{margin:12px auto}
      .selected-label{font-size:23px}
      .forecast-card{padding:10px 0;margin-top:12px}
      .forecast-card .big{font-size:28px}
      .stat-row{margin-top:12px}
      .stat-cell{padding:9px 5px}
      .stat-number{font-size:25px}
      .bottom-area{padding-top:13px}
    }
  </style>
</head>
<body>
  <main id="app" class="app"></main>
  <script>
  (()=>{
    const KEY='operacion_navidad_v5';
    const MAX_DAYS=365;
    const TARGET=2000000;
    const unlocks={
      2:'RECOGER MATERIALES',
      3:'FABRICAR REGALOS',
      4:'CONTRATAR DUENDE FABRICANTE',
      5:'CONTRATAR DUENDE RECOLECTOR',
      6:'FORMAR FABRICANTES',
      7:'FORMAR RECOLECTORES'
    };
    const app=document.getElementById('app');

    const fresh=()=>({
      started:false,
      day:1,
      gifts:0,
      materials:0,
      santaLevel:1,
      makerCount:0,
      makerLevel:1,
      collectorCount:0,
      collectorLevel:1,
      lastAction:'study',
      lastResult:null,
      finished:null
    });

    let state=load();
    let view=state.started ? (state.finished ? 'final' : 'dashboard') : 'title';
    let selectedAction=defaultAction(state);
    let dropdownOpen=false;

    function load(){
      try{
        const raw=localStorage.getItem(KEY);
        return raw ? {...fresh(),...JSON.parse(raw)} : fresh();
      }catch(e){ return fresh(); }
    }
    function save(){
      try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){}
    }
    function fmt(n){ return (Number(n)||0).toLocaleString('es-ES'); }
    function currentPace(){ return state.day<=1 ? 0 : Math.round(state.gifts/(state.day-1)); }

    function availableActions(s){
      const list=[{id:'study',label:'ESTUDIAR'}];
      if(s.santaLevel>=2) list.push({id:'collect',label:`RECOGER MATERIALES  +${fmt(s.santaLevel*5)}`});
      if(s.santaLevel>=3) list.push({id:'craft',label:`FABRICAR REGALOS  +${fmt(s.santaLevel)}  ·  −${fmt(s.santaLevel)} MAT.`,disabled:s.materials<s.santaLevel});
      if(s.santaLevel>=4) list.push({id:'hireMaker',label:'CONTRATAR DUENDE FABRICANTE'});
      if(s.santaLevel>=5) list.push({id:'hireCollector',label:'CONTRATAR DUENDE RECOLECTOR'});
      if(s.santaLevel>=6) list.push({id:'trainMakers',label:'FORMAR FABRICANTES',disabled:s.makerCount<=0});
      if(s.santaLevel>=7) list.push({id:'trainCollectors',label:'FORMAR RECOLECTORES',disabled:s.collectorCount<=0});
      return list;
    }
    function firstAction(s){ return availableActions(s).find(a=>!a.disabled)?.id || 'study'; }
    function defaultAction(s){ return availableActions(s).some(a=>a.id===s.lastAction&&!a.disabled) ? s.lastAction : firstAction(s); }
    function nextUnlockFor(s){
      const level=s.santaLevel+1;
      return unlocks[level] ? {level,name:unlocks[level]} : null;
    }
    function previewDay(actionId){
      let materialGain=state.collectorCount*state.collectorLevel*5;
      let requestedGifts=state.makerCount*state.makerLevel;
      if(actionId==='collect') materialGain+=state.santaLevel*5;
      if(actionId==='craft') requestedGifts+=state.santaLevel;
      const giftsMade=Math.min(requestedGifts,state.materials+materialGain);
      const netMaterials=materialGain-giftsMade;
      return {materialGain,requestedGifts,giftsMade,netMaterials};
    }
    function studyReward(){ return nextUnlockFor(state)?.name || 'MÁS POTENCIA'; }

    function header(day=state.day){
      return `<div class="head"><div>DÍA ${fmt(Math.min(day,MAX_DAYS))} / ${MAX_DAYS}</div><div class="right">REGALOS ${fmt(state.gifts)} / ${fmt(TARGET)}</div></div><div class="top-rule"></div>`;
    }
    function footer(extra=''){
      return `<div class="bottom-area">${extra}<div class="footer-actions"><button data-act="reset">REINICIAR</button></div></div>`;
    }

    function renderTitle(){
      app.innerHTML=`
        <section class="screen">
          <div class="head title-head"><div>NIVEL 1</div><div class="right">OPERACIÓN NAVIDAD</div></div>
          <div class="top-rule"></div>
          <div class="spacer"></div>
          <div class="section-title">MISIÓN</div>
          <h1 class="big-word">2.000.000</h1>
          <div class="hero-word">REGALOS</div>
          <div class="script note">antes de Navidad</div>
          <div class="spacer"></div>
          ${footer(`<button class="pill" data-act="start">${state.started?'CONTINUAR':'EMPEZAR'}</button>`)}
        </section>`;
    }

    function lastBlock(){
      const r=state.lastResult;
      if(!r || !state.started || state.day<=1) return '';
      const net=r.materialGain-r.materialsUsed;
      return `<div class="last-day"><div class="summary">+${fmt(r.giftsMade)} REGALOS · ${net>=0?'+':''}${fmt(net)} MAT.</div></div>`;
    }

    function renderDashboard(){
      app.innerHTML=`
        <section class="screen">
          ${header()}
          ${lastBlock()}
          <div class="section-title">ESTADO DEL DÍA</div>
          <h2 class="hero-number">${fmt(state.gifts)}</h2>
          <div class="hero-label">REGALOS FABRICADOS</div>
          <div class="stat-row" aria-label="Recursos y equipo">
            <div class="stat-cell">
              <div class="stat-number">${fmt(state.materials)}</div>
              <div class="stat-label">Materiales</div>
            </div>
            <div class="stat-cell">
              <div class="stat-number">${fmt(state.makerCount)}</div>
              <div class="stat-label">Duendes fab.</div>
            </div>
            <div class="stat-cell">
              <div class="stat-number">${fmt(state.collectorCount)}</div>
              <div class="stat-label">Duendes reco.</div>
            </div>
          </div>
          ${footer(`<button class="pill" data-act="plan">PLANIFICAR DÍA</button><div class="script note">ritmo actual: ${fmt(currentPace())} regalos / día</div>`)}
        </section>`;
    }

    function renderPlanning(){
      const actions=availableActions(state);
      if(!actions.some(a=>a.id===selectedAction&&!a.disabled)) selectedAction=defaultAction(state);
      const enabled=actions.filter(a=>!a.disabled);
      const selected=actions.find(a=>a.id===selectedAction) || enabled[0] || actions[0];
      const multi=enabled.length>1;
      const preview=previewDay(selectedAction);
      const reward=studyReward();
      app.innerHTML=`
        <section class="screen">
          ${header()}
          <div class="planning-meta">SANTA CLAUS · NVL. ${fmt(state.santaLevel)}</div>
          <div class="section-title">PLAN DEL DÍA</div>
          ${multi ? `
            <div class="dropdown ${dropdownOpen?'open':''}">
              <button class="select-face" data-act="toggle" aria-expanded="${dropdownOpen}">
                <span><span class="selected-label">${selected.label}</span></span><span class="chevron">⌄</span>
              </button>
              <div class="options">
                ${actions.map(a=>`<button class="option ${selectedAction===a.id?'selected':''} ${a.disabled?'disabled':''}" data-act="choose" data-id="${a.id}">${a.label}</button>`).join('')}
              </div>
            </div>` : `
            <div class="dropdown">
              <div class="select-face static"><span><span class="selected-label">${selected.label}</span></span></div>
            </div>`}
          <div class="forecast-card">
            <div class="title">Resultado</div>
            <div class="big">+${fmt(preview.giftsMade)} regalos</div>
            ${preview.netMaterials!==0 ? `<div class="small">${preview.netMaterials>0?'+':''}${fmt(preview.netMaterials)} materiales netos</div>` : ''}
            ${selectedAction==='study' ? `<div class="small">+HABILIDAD: ${reward}</div>` : ''}
          </div>
          ${footer(`<button class="pill" data-act="finish">TERMINAR DÍA</button>`)}
        </section>`;
    }

    function resolveDay(){
      if(!state.started || state.finished) return;
      const actionId=selectedAction;
      const startDay=state.day;
      const startLevel=state.santaLevel;
      const startMaterials=state.materials;
      const startGifts=state.gifts;
      let materialGain=state.collectorCount*state.collectorLevel*5;
      let collectorGain=materialGain;
      let santaMaterialGain=0;
      let requestedGifts=state.makerCount*state.makerLevel;
      let santaRequested=0;
      const pending=[];
      let unlocked=null;

      if(actionId==='collect'){
        santaMaterialGain=state.santaLevel*5;
        materialGain+=santaMaterialGain;
      }
      if(actionId==='craft'){
        santaRequested=state.santaLevel;
        requestedGifts+=santaRequested;
      }

      const availableMaterials=startMaterials+materialGain;
      const giftsMade=Math.min(requestedGifts,availableMaterials);
      const materialsUsed=giftsMade;
      const santaMade=Math.min(santaRequested,giftsMade);
      const makersMade=giftsMade-santaMade;

      state.materials=availableMaterials-materialsUsed;
      state.gifts+=giftsMade;

      if(actionId==='study'){
        state.santaLevel++;
        unlocked=unlocks[state.santaLevel] || null;
      }
      if(actionId==='hireMaker'){
        state.makerCount++;
        pending.push('Nuevo duende fabricante');
      }
      if(actionId==='hireCollector'){
        state.collectorCount++;
        pending.push('Nuevo duende recolector');
      }
      if(actionId==='trainMakers' && state.makerCount>0){
        state.makerLevel++;
        pending.push(`Fabricantes suben a NVL. ${fmt(state.makerLevel)}`);
      }
      if(actionId==='trainCollectors' && state.collectorCount>0){
        state.collectorLevel++;
        pending.push(`Recolectores suben a NVL. ${fmt(state.collectorLevel)}`);
      }

      state.lastResult={
        startDay,
        actionId,
        startSantaLevel:startLevel,
        newSantaLevel:state.santaLevel,
        startMaterials,
        endMaterials:state.materials,
        startGifts,
        endGifts:state.gifts,
        materialGain,
        collectorGain,
        santaMaterialGain,
        materialsUsed,
        giftsMade,
        requestedGifts,
        santaMade,
        makersMade,
        limitedByMaterials:requestedGifts>giftsMade,
        pending,
        unlocked
      };
      state.lastAction=actionId;

      if(state.gifts>=TARGET){
        state.finished={won:true,day:startDay};
        save();
        view='final';
        render();
        return;
      }
      if(startDay>=MAX_DAYS){
        state.finished={won:false,day:startDay};
        save();
        view='final';
        render();
        return;
      }

      state.day=startDay+1;
      selectedAction=defaultAction(state);
      dropdownOpen=false;
      save();
      view=(actionId==='study' && state.santaLevel>startLevel) ? 'level' : 'dashboard';
      render();
    }

    function confetti(){
      let html='';
      for(let i=0;i<42;i++){
        const x=Math.round(Math.random()*100);
        const dx=Math.round((Math.random()-.5)*130)+'px';
        const w=4+Math.round(Math.random()*8);
        const h=6+Math.round(Math.random()*14);
        const d=(1.1+Math.random()*1.4).toFixed(2)+'s';
        const delay=(Math.random()*0.38).toFixed(2)+'s';
        const o=(.45+Math.random()*.45).toFixed(2);
        html+=`<i style="--x:${x}%;--dx:${dx};--w:${w}px;--h:${h}px;--d:${d};--delay:${delay};--o:${o}"></i>`;
      }
      return html;
    }
    function renderLevel(){
      const r=state.lastResult;
      if(!r){ view='dashboard'; render(); return; }
      const ability=r.unlocked || 'MÁS POTENCIA';
      app.innerHTML=`
        <section class="screen">
          ${header()}
          <div class="level-screen">
            <div class="confetti">${confetti()}</div>
            <div class="level-frame">
              <span class="level-eyebrow">nuevo nivel</span>
              <span class="level-number" id="levelNumber" data-from="${r.startSantaLevel}" data-to="${r.newSantaLevel}">${fmt(r.startSantaLevel)}</span>
            </div>
            <div class="ability-card">
              <div class="eyebrow">${r.unlocked?'nueva habilidad':'mejora'}</div>
              <div class="name">${ability}</div>
            </div>
          </div>
          ${footer(`<button class="pill" data-act="levelDone">CONTINUAR</button>`)}
        </section>`;
      animateLevelNumber();
    }
    function animateLevelNumber(){
      const el=document.getElementById('levelNumber');
      if(!el) return;
      const from=Number(el.dataset.from),to=Number(el.dataset.to),start=performance.now(),duration=720;
      function tick(now){
        const p=Math.min(1,(now-start)/duration);
        const eased=1-Math.pow(1-p,3);
        el.textContent=fmt(Math.round(from+(to-from)*eased));
        if(p<1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function renderFinal(){
      const won=!!state.finished?.won;
      const day=state.finished?.day || state.day;
      const missing=Math.max(0,TARGET-state.gifts);
      app.innerHTML=`
        <section class="screen">
          <div class="head"><div>DÍA ${fmt(Math.min(day,MAX_DAYS))} / ${MAX_DAYS}</div><div class="right">REGALOS ${fmt(state.gifts)} / ${fmt(TARGET)}</div></div>
          <div class="top-rule"></div>
          <div class="spacer"></div>
          <div class="section-title">RESULTADO</div>
          <h1 class="big-word">${won?'NAVIDAD':'FALTAN'}</h1>
          <div class="hero-word">${won?'SALVADA':fmt(missing)}</div>
          <div class="script note">${won?'todos tienen su regalo':'regalos por fabricar'}</div>
          <p class="final-text">${won?`Has fabricado ${fmt(state.gifts)} regalos en ${fmt(day)} días.`:`Has terminado con ${fmt(state.gifts)} regalos de ${fmt(TARGET)}.`}</p>
          <div class="spacer"></div>
          ${footer(`<button class="pill" data-act="resetNoConfirm">JUGAR OTRA VEZ</button>`)}
        </section>`;
    }

    function reset(confirmIt=true){
      if(confirmIt && !confirm('¿Reiniciar la partida?')) return;
      state=fresh();
      localStorage.removeItem(KEY);
      selectedAction=defaultAction(state);
      dropdownOpen=false;
      view='title';
      render();
    }
    function render(){
      if(view==='title') return renderTitle();
      if(view==='dashboard') return renderDashboard();
      if(view==='planning') return renderPlanning();
      if(view==='level') return renderLevel();
      if(view==='final') return renderFinal();
    }

    app.addEventListener('click',ev=>{
      const btn=ev.target.closest('[data-act]');
      if(!btn) return;
      const act=btn.dataset.act;
      if(act==='start'){
        state.started=true;
        state.finished=null;
        selectedAction=defaultAction(state);
        dropdownOpen=false;
        save();
        view='dashboard';
        render();
      }
      if(act==='reset') reset(true);
      if(act==='resetNoConfirm') reset(false);
      if(act==='plan'){
        selectedAction=defaultAction(state);
        dropdownOpen=false;
        view='planning';
        render();
      }
      if(act==='toggle'){
        dropdownOpen=!dropdownOpen;
        renderPlanning();
      }
      if(act==='choose'){
        if(btn.classList.contains('disabled')) return;
        selectedAction=btn.dataset.id;
        dropdownOpen=false;
        renderPlanning();
      }
      if(act==='finish') resolveDay();
      if(act==='levelDone'){
        view='dashboard';
        render();
      }
    });
    document.addEventListener('click',ev=>{
      if(dropdownOpen && !ev.target.closest('.dropdown')){
        dropdownOpen=false;
        if(view==='planning') renderPlanning();
      }
    });

    render();
  })();
  </script>
</body>
</html>
